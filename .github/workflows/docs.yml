name: Deploy Zensical Site

# 触发条件：推送到 master 或 main 分支，或手动触发
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

# 设置必要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 取消并发运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 稳定版本

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install zensical

      - name: 构建静态站点
        run: zensical build --clean

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site' # 确保 zensical 输出的目录是 site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4